<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clock</title>
    <link rel="stylesheet" href="font-faces.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/gminnyoszustpodatkowy-sudo/gminnyoszustpodatkowy-sudo.github.io/main/other/icons/favicon.png" type="image/x-icon">
</head>

<body>
    <main>
        <h3>Do końca dzisiejszej praktyki zostało: </h3>
        <h1>Godzina</h1>
    </main>
    <footer>
        <h6>sekundy</h6>
    </footer>
    <script>
        const dt = new Date();
        const date = Date.parse(new Date());
        const start = dt.setHours(15, 0, 0, 0);
        const end = dt.setHours(8, 0, 0, 0);
        const daystart = dt.setHours(0, 0, 0, 0);
        if (date < start && date > end) {
            function czasen() {
                const target = new Date();
                target.setHours(15, 0, 0, 0);
                const now = new Date();
                let diff = target - now;
                let hours = Math.floor(diff / (1000 * 60 * 60));
                let minutes = Math.floor((diff / (1000 * 60)) % 60);
                let seconds = Math.floor((diff / 1000) % 60);
                if (minutes < 10) { minutes = `0${minutes}` }
                if (seconds < 10) { seconds = `0${seconds}` }

                document.querySelector('h1').innerHTML = `${hours}:${minutes}`;
                document.querySelector('h6').innerHTML = `${hours}:${minutes}:${seconds}`;

            }
            setInterval(czasen, 1000)
        }
        else if (date < daystart) {
            document.querySelector('h3').innerHTML = `Praktyka się jeszcze nie zaczęła.`;
        }
        else {
            document.querySelector('h3').innerHTML = `Praktyka się skończyła.`;
        }
    </script>
</body>



</html>
